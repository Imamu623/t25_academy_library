<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>

<body>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍一覧</div>
                <div class="btn_block">
                    <div style = "text-align: right;">
                    <form th:action="@{/book/add}" method="get"style="display: inline-block;">
                        <input type="submit" value="+書籍登録" style="padding: 12px 24px; font-size: 16px; background-color: #87f4b4fa;border: 1px solid #87f4b4fa;">
                    </form>
                    </div>
                </div>
            </div>
            <div class="book_list">
                <table border="1" cellspacing="0" cellpadding="8" style="width: 45%; text-align: left; margin:auto;">
                    <thead>
                        <tr>
                            <th style="background-color: #F0F0F0;">書籍名</th>
                            <th style="background-color: #F0F0F0;">ISBN</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${bookMstList}">
                            <td th:text="${book.title}">書籍名</td>
                            <td th:text="${book.isbn}">ISBN</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
