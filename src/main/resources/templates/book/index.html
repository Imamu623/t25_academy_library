<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org">

<head th:replace="~{common :: meta_header('書籍一覧',~{::link},~{::script})}">
    <title th:text="${title}+' | MTLibrary'"></title>
    <link rel="stylesheet" th:href="@{/css/book/index.css}" />
    <script type="text/javascript" th:src="@{/js/book/index.js}"></script>
</head>

<body>
    <div th:if="${errorMessage}" class="modal-overlay" id="popupModal">
        <div class="modal-content">
            <span class="modal-close" onclick="closePopup()">&times;</span>
            <p th:text="${errorMessage}"></p>
        </div>
        <script>
            function closePopup() {
                document.getElementById('popupModal').style.display = 'none';
            }
        </script>
    </div>
    <div class="contents">
        <div th:replace="~{common :: main_sidebar}"></div>
        <div class="main_contents">
            <div th:replace="~{common :: header}"></div>
            <div class="inner_contens">
                <div class="page_title">書籍一覧</div>
                <div style="text-align: right;">
                    <button class="button-link"
                        onclick="window.location.href='http://localhost:8080/mt_library/book/add'"> <img
                            th:src="@{/images/icons/add.png}" alt="アイコン"
                            style="height: 15px; vertical-align: middle; margin-right: 5px;"><span
                            style="font-size: 10px;"></span>書籍登録</button>
                </div>
            </div>
            <div class="book_list">
                <table border="1" cellspacing="0" cellpadding="8" style="width: 45%; text-align: left; margin:auto;">
                    <thead>
                        <tr>
                            <th style="background-color: #F0F0F0;">書籍名</th>
                            <th style="background-color: #F0F0F0;">ISBN</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="book : ${bookMstList}">

                            <td>
                                <a th:href="@{/book/edit(id=${book.id})}">
                                    <img th:src="@{/images/icons/edit.png}" alt="アイコン">
                                </a>
                                <span th:text="${book.title}"> </span>

                            </td>
                            <td th:text="${book.isbn}">ISBN</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div th:replace="~{common :: footer}"></div>
</body>
